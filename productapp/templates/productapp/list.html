<html>
    <head>
        <title> Product List</title>
    </head>
    <body>

        <style>
            table{
                border-collapse: collapse;
            }
            td,th{
                border:1px solid #000;
            }
        </style>

<a href="{% url "product_add" %}"> ADD ITEM </a>
        <form method="GET">
            <input type="text"
                    name="keyword"
                    placeholder="Search"
                    value={{search}}>
            <input type="submit"
                    value="Search">
        </form>
        <table>
            <thead>
                <tr>
                    <th> Product ID</th>
                    <th> Name </th>
                    <th> Price</th>
                </tr>
            </thead>
            <tbody>
               {% for item in items %}
               <tr>
                    <td>{{item.productid}}</td>
                    <td>{{item.name}}</td>
                    <td>{{item.price}}</td>
               </tr>
               {% endfor %}
            </tbody>
        </table>
    </body>
</html>
